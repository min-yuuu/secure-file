server:
  port: 9002

spring:
  application:
    name: secure-file-transfer
  
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/secure_file?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.securefile.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 文件存储配置
file:
  storage:
    base-path: /root/web/svan/securefile/securefile/file/
